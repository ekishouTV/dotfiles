[tools]
bat = "latest"
cspell = "latest"
delta = "latest"
dua = "latest"
edit = "latest"
eza = "latest"
fastfetch = "latest"
gemini = "latest"
ghq = "latest"
lazygit = "latest"
node = "latest"
"npm:fx" = "latest"
starship = "latest"
usage = "latest"
yazi = "latest"

[tasks.recreate-docker-volume]
run = """
    volume={{arg(name='volume')}}
    docker volume inspect $volume
    docker volume rm $volume
    docker volume create $volume
"""

[tasks.backup-docker-volume]
run = """
    volume={{arg(name='volume')}}
    path={{arg(name='path')}}
    docker run --rm -v $volume:/$volume alpine \
    sh -c "apk add --no-cache --quiet zstd && tar -cf - /$volume | zstd" > $path
"""

[tasks.restore-docker-volume]
run = """
    volume={{arg(name='volume')}}
    path={{arg(name='path')}}
    cat $path | docker run --rm -i -v $volume:/$volume alpine \
    sh -c "apk add --no-cache --quiet zstd && zstd -dc | tar -x -C /tmp/ && mv /tmp/$volume/* /$volume"
"""

[tasks.remove-anonymous-volumes]
run = "docker volume rm $(docker volume ls -q -f label=com.docker.volume.anonymous)"

[tasks.outdated-with-last-update-time]
alias = "olut"
run = '''
    lastUpdateTime=$(
        eza -l --time-style=full-iso --no-user --no-permissions ~/.local/share/mise/installs/ \
        | fx -rs "map(x => /-\s(.*\+\d{4})\s(.*)/.exec(x).slice(-2).reverse())" \
        | fx "Object.fromEntries" "{lastUpdateTime: x}"
    )
    apps=$(mise outdated -J | fx "values" "{'apps': x}")
    echo $apps $lastUpdateTime \
    | fx -s "Object.assign({}, ...x)" \
        "x.apps.map(app => {
          return {
            name: app.name, current: app.current, latest: app.latest, lastUpdateTime: x['lastUpdateTime'][app.name.replace(':', '-')]
          }
        }
        )" \
        "console.table" \
    2>/dev/null
'''
quiet = true

[tasks.flatpak-outdated-with-last-update-time]
alias = "fpolut"
run = '''
    lastUpdateTimes=$(
        eza -l --time-style=full-iso -R -L 8 -D --no-user --no-permissions --absolute /var/lib/flatpak/ | grep stable \
        | fx -rs \
            "map((x) => {
              const datatime = /-\s(.*\+\d{4})\s(.*)/.exec(x).slice(-2).at(0)
              const id = /\/var\/lib\/flatpak\/(app|runtime)\/(.*)\/x86_64\/stable/
                .exec(x)
                .at(-1)

              return [id, datatime]
            })" \
        | fx "Object.fromEntries" "{lastUpdateTimes: x}"
    )
    apps=$(
        flatpak list --columns=application,version \
        | fx -rs "map(x => x.split('\t'))" \
        | fx \
            "map((x) => {
              const [id, version] = x

              return [id, version]
            })" \
        | fx "Object.fromEntries" "{'apps': x}"
    )
    remotes=$(
        flatpak remote-ls --updates --columns=name,application,version \
        | fx -rs "map(x => x.split('\t'))" \
        | fx \
            "map((x) => {
              const [name, id, version] = x

              return { name, id, version }
            })" \
            "values" "{'remotes': x}"
    )
    echo $apps $remotes $lastUpdateTimes \
    | fx -s "Object.assign({}, ...x)" \
        "x.remotes.map((remote) => {
          return {
            name: remote.name,
            current: x.apps[remote.id],
            latest: remote.version,
            lastUpdateTime: x.lastUpdateTimes[remote.id],
          }
        })" \
        "console.table" \
    2>/dev/null
'''
quiet = true

[tasks.spell]
run = [
    "git log --pretty=format:'%B' -n 1 | cspell --no-progress --no-summary stdin",
    "git ls-tree -r HEAD --name-only | cspell --no-progress --no-summary stdin",
    "cspell ** --no-progress --no-summary"
]

[settings]
idiomatic_version_file = false
install_before = "7d"
lockfile = true
